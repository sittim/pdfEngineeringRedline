name: Build Windows executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pytest pytest-qt

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build standalone application
        run: python scripts/build.py

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: pdfredline-windows
          path: dist/PDFRedline/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pdfredline-windows
          path: artifacts/pdfredline-windows

      - name: Zip Windows build
        run: |
          cd artifacts
          zip -r pdfredline-windows.zip pdfredline-windows
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/pdfredline-windows.zip
          generate_release_notes: true
